<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N-Pane Draft Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── AUTH MODAL ── -->
<div id="auth-modal" class="auth-modal hidden">
  <div class="auth-card">
    <button id="auth-modal-close" class="auth-close btn btn-ghost btn-icon">✕</button>
    <div class="auth-cloud-icon">☁</div>
    <h2 id="auth-title" class="auth-title">Sign in to sync</h2>
    <p class="auth-subtitle">Projects and presets sync across all your devices.</p>
    <form id="auth-form" class="auth-form" novalidate>
      <input id="auth-email"    type="email"    placeholder="Email"    autocomplete="email"            required>
      <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" required>
      <p id="auth-error" class="auth-error"></p>
      <button id="btn-auth-submit" type="submit" class="btn btn-primary auth-submit">Sign in</button>
    </form>
    <button id="btn-auth-toggle" class="auth-toggle">Don't have an account? Register</button>
  </div>
</div>

<!-- ── SIDEBAR ── -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Projects</span>
    <button id="btn-save-project" class="btn btn-ghost btn-icon" title="Save current as project" style="width:24px;height:24px;font-size:14px;">↑</button>
  </div>
  <div class="sidebar-body" id="project-list"></div>
  <div class="sidebar-footer">
    <button id="btn-new-project" class="sidebar-new-btn">＋ New project</button>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="app-shell">

  <header class="app-header">
    <button id="sidebar-toggle" class="btn btn-ghost btn-icon sidebar-toggle" title="Toggle projects sidebar">❤︎</button>
    <span
      id="app-title"
      class="app-title"
      contenteditable="true"
      spellcheck="false"
      title="Click to rename"
    >N-Pane Draft Workspace</span>
    <div class="header-actions">
      <button id="btn-find" class="btn btn-ghost btn-icon" title="Find & Replace (Ctrl+H)">⌕</button>

      <!-- Sync / user button -->
      <div class="user-menu-wrap">
        <button id="btn-user-menu" class="btn btn-ghost btn-icon user-btn" title="Sign in to sync">☁</button>
        <div id="user-menu-drop" class="user-menu-drop hidden">
          <div id="user-menu-email" class="user-menu-email"></div>
          <div id="sync-indicator" class="sync-indicator">
            <span class="sync-dot"></span>
            <span class="sync-label">Synced</span>
          </div>
          <button id="btn-logout" class="btn btn-ghost user-menu-logout">Sign out</button>
        </div>
      </div>

      <button id="controls-toggle" class="btn btn-ghost btn-icon" aria-expanded="true" title="Toggle settings">⚙</button>
    </div>
  </header>

  <!-- ── CONTROLS ── -->
  <div id="controls-wrapper" class="controls-wrapper">
    <div class="controls-panel">

      <!-- Structure -->
      <div class="controls-section">
        <div class="controls-section-title">Structure</div>
        <div style="margin-bottom:10px;">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">Quick layouts</div>
          <div class="layout-chips">
            <button class="layout-chip" data-layout="translate-2" title="2 pads: Translation | Original">⇄ 2-col</button>
            <button class="layout-chip" data-layout="translate-3" title="3 pads: Translation | Original | Notes">⇄ 3-col</button>
            <button class="layout-chip" data-layout="quad"        title="2×2 grid">⊞ 2×2</button>
            <button class="layout-chip" data-layout="free"        title="3×2 grid">⊞ 3×2</button>
          </div>
        </div>
        <div class="control-row">
          <label for="ctrl-columns">Columns</label>
          <input type="number" id="ctrl-columns" min="1" max="6" value="2">
        </div>
        <div class="control-row">
          <label for="ctrl-pads">Pads</label>
          <input type="number" id="ctrl-pads" min="1" max="20" value="2">
        </div>
        <div class="control-row">
          <label for="ctrl-height">Pad height</label>
          <input type="number" id="ctrl-height" min="80" max="2000" step="20" value="280">
          <span style="font-size:11px;color:var(--text-muted)">px</span>
        </div>
      </div>

      <!-- Visuals -->
      <div class="controls-section">
        <div class="controls-section-title">Visuals</div>
        <div class="control-row">
          <label for="ctrl-font">Font</label>
          <select id="ctrl-font">
            <option value="lora">Lora (serif)</option>
            <option value="dm-sans">DM Sans</option>
            <option value="jetbrains">Mono</option>
            <option value="georgia">Georgia</option>
            <option value="times">Times</option>
            <option value="system">System</option>
          </select>
        </div>
        <div class="control-row">
          <label for="ctrl-fontSize">Font size</label>
          <input type="number" id="ctrl-fontSize" min="10" max="32" value="15">
          <span style="font-size:11px;color:var(--text-muted)">px</span>
        </div>
        <div class="control-row">
          <label for="ctrl-textColor">Text</label>
          <input type="color" id="ctrl-textColor" value="#2a2520">
        </div>
        <div class="control-row">
          <label for="ctrl-paperColor">Pad bg</label>
          <input type="color" id="ctrl-paperColor" value="#faf9f7">
        </div>
        <div class="control-row">
          <label for="ctrl-bgColor">Page bg</label>
          <input type="color" id="ctrl-bgColor" value="#f0ede8">
        </div>
        <div class="control-row">
          <label for="ctrl-borderColor">Border</label>
          <input type="color" id="ctrl-borderColor" value="#ddd9d2">
          <input type="number" id="ctrl-borderWidth" min="0" max="8" value="1" style="width:46px;" title="Border width (px)">
        </div>
        <div class="control-row">
          <label for="ctrl-padding">Padding</label>
          <input type="number" id="ctrl-padding" min="0" max="60" value="18">
        </div>
        <div class="control-row">
          <label for="ctrl-radius">Radius</label>
          <input type="number" id="ctrl-radius" min="0" max="32" value="10">
        </div>
      </div>

      <!-- Presets & I/O -->
      <div class="controls-section">
        <div class="controls-section-title">Visual Presets</div>
        <div class="control-row" style="margin-bottom:8px;">
          <label for="preset-name">Name</label>
          <input type="text" id="preset-name" placeholder="My preset…" style="flex:1;">
        </div>
        <div class="preset-row" style="margin-bottom:8px;">
          <select id="preset-list" style="flex:1;min-width:0;"></select>
        </div>
        <div class="preset-row">
          <button id="btn-save-preset" class="btn btn-primary">Save</button>
          <button id="btn-load-preset" class="btn">Load</button>
          <button id="btn-delete-preset" class="btn btn-danger">Delete</button>
        </div>

        <div class="section-divider"></div>
        <div class="controls-section-title">Import / Export</div>
        <div class="controls-actions">
          <button id="btn-export-ws" class="btn" title="Export workspace JSON">↑ Workspace</button>
          <button id="btn-import-ws" class="btn" title="Import workspace JSON">↓ Workspace</button>
          <input type="file" id="file-import-ws" accept=".json" style="display:none;">
          <button id="btn-export-visual" class="btn" title="Export visual preset">↑ Visual</button>
          <button id="btn-import-visual" class="btn" title="Import visual preset">↓ Visual</button>
          <input type="file" id="file-import-visual" accept=".json" style="display:none;">
        </div>
        <div class="section-divider"></div>
        <div class="controls-actions">
          <button id="btn-select-folder" class="btn" title="Link a folder to auto-sync presets">📁 Link folder</button>
          <button id="btn-reset-all" class="btn btn-danger">Reset all</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── FIND & REPLACE ── -->
  <div id="find-bar" class="find-bar hidden">
    <input type="text" id="find-input"   placeholder="Find…"    style="width:150px;">
    <span class="find-bar-sep">→</span>
    <input type="text" id="replace-input" placeholder="Replace…" style="width:150px;">
    <button id="btn-replace-one"  class="btn" style="padding:4px 8px;">Replace</button>
    <button id="btn-replace-all"  class="btn" style="padding:4px 8px;">All</button>
    <span id="find-count" class="find-count"></span>
    <button id="btn-find-close" class="btn btn-ghost btn-icon" style="margin-left:auto;width:24px;height:24px;">✕</button>
  </div>

  <!-- ── PAD GRID ── -->
  <div class="grid-wrapper">
    <div id="pad-grid" class="pad-grid"></div>
  </div>

  <!-- ── STATUS BAR ── -->
  <div class="status-bar">
    <span id="status-saved" style="opacity:0.7;"></span>
    <span id="status-words"></span>
    <span style="margin-left:auto;opacity:0.5;" title="Ctrl+Shift+F = focus, Esc = exit, Ctrl+H = find">Ctrl+Shift+F · Ctrl+H</span>
  </div>

</div><!-- /.app-shell -->

<div id="toast-container" class="toast-container"></div>

<script type="module" src="app.js"></script>
</body>
</html>
