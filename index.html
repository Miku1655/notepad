<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N-Pane Draft Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <span
      id="app-title"
      class="app-title"
      contenteditable="true"
      spellcheck="false"
      title="Click to rename workspace"
    >N-Pane Draft Workspace</span>

    <div class="header-actions">
      <button id="controls-toggle" class="btn btn-icon btn-ghost" aria-expanded="true" title="Hide settings">⚙</button>
    </div>
  </header>

  <!-- ── CONTROLS ── -->
  <div id="controls-wrapper" class="controls-wrapper">
    <div class="controls-panel">

      <!-- Structure -->
      <div class="controls-section">
        <div class="controls-section-title">Structure</div>

        <div style="margin-bottom:10px;">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">Quick layouts</div>
          <div class="layout-chips">
            <button class="layout-chip" data-layout="translate-2" title="2 pads: Translation | Original">
              ⇄ 2-col
            </button>
            <button class="layout-chip" data-layout="translate-3" title="3 pads: Translation | Original | Notes">
              ⇄ 3-col
            </button>
            <button class="layout-chip" data-layout="quad" title="2×2 grid">
              ⊞ 2×2
            </button>
            <button class="layout-chip" data-layout="free" title="3×2 grid">
              ⊞ 3×2
            </button>
          </div>
        </div>

        <div class="control-row">
          <label for="ctrl-columns">Columns</label>
          <input type="number" id="ctrl-columns" min="1" max="6" value="2">
        </div>
        <div class="control-row">
          <label for="ctrl-pads">Pads</label>
          <input type="number" id="ctrl-pads" min="1" max="20" value="2">
        </div>
        <div class="control-row">
          <label for="ctrl-height">Pad height</label>
          <input type="number" id="ctrl-height" min="80" max="2000" step="20" value="280">
          <span style="font-size:11px;color:var(--text-muted)">px</span>
        </div>
      </div>

      <!-- Visuals -->
      <div class="controls-section">
        <div class="controls-section-title">Visuals</div>

        <div class="control-row">
          <label for="ctrl-font">Font</label>
          <select id="ctrl-font">
            <option value="lora">Lora (serif)</option>
            <option value="dm-sans">DM Sans</option>
            <option value="jetbrains">Mono</option>
            <option value="georgia">Georgia</option>
            <option value="times">Times</option>
            <option value="system">System</option>
          </select>
        </div>
        <div class="control-row">
          <label for="ctrl-fontSize">Font size</label>
          <input type="number" id="ctrl-fontSize" min="10" max="32" value="15">
          <span style="font-size:11px;color:var(--text-muted)">px</span>
        </div>
        <div class="control-row">
          <label for="ctrl-textColor">Text</label>
          <input type="color" id="ctrl-textColor" value="#2a2520">
        </div>
        <div class="control-row">
          <label for="ctrl-paperColor">Pad bg</label>
          <input type="color" id="ctrl-paperColor" value="#faf9f7">
        </div>
        <div class="control-row">
          <label for="ctrl-bgColor">Page bg</label>
          <input type="color" id="ctrl-bgColor" value="#f0ede8">
        </div>
        <div class="control-row">
          <label for="ctrl-borderColor">Border</label>
          <input type="color" id="ctrl-borderColor" value="#ddd9d2">
          <input type="number" id="ctrl-borderWidth" min="0" max="8" value="1" style="width:46px;" title="Border width (px)">
        </div>
        <div class="control-row">
          <label for="ctrl-padding">Padding</label>
          <input type="number" id="ctrl-padding" min="0" max="60" value="18">
        </div>
        <div class="control-row">
          <label for="ctrl-radius">Radius</label>
          <input type="number" id="ctrl-radius" min="0" max="32" value="10">
        </div>
      </div>

      <!-- Presets & I/O -->
      <div class="controls-section">
        <div class="controls-section-title">Presets</div>

        <div class="control-row" style="margin-bottom:8px;">
          <label for="preset-name">Name</label>
          <input type="text" id="preset-name" placeholder="My preset…" style="flex:1;">
        </div>

        <div class="preset-row" style="margin-bottom:8px;">
          <select id="preset-list" style="flex:1;min-width:0;"></select>
        </div>

        <div class="preset-row">
          <button id="btn-save-preset" class="btn btn-primary">Save</button>
          <button id="btn-load-preset" class="btn">Load</button>
          <button id="btn-delete-preset" class="btn btn-danger">Delete</button>
        </div>

        <div class="section-divider"></div>
        <div class="controls-section-title">Import / Export</div>

        <div class="controls-actions">
          <button id="btn-export-ws" class="btn" title="Export full workspace (text + settings)">↑ Workspace</button>
          <button id="btn-import-ws" class="btn" title="Import workspace JSON">↓ Workspace</button>
          <input type="file" id="file-import-ws" accept=".json" style="display:none;">

          <button id="btn-export-visual" class="btn" title="Export visual preset JSON">↑ Visual</button>
          <button id="btn-import-visual" class="btn" title="Import visual preset JSON">↓ Visual</button>
          <input type="file" id="file-import-visual" accept=".json" style="display:none;">
        </div>

        <div class="section-divider"></div>

        <div class="controls-actions">
          <button id="btn-select-folder" class="btn" title="Link a folder to auto-sync presets">
            📁 Link folder
          </button>
          <button id="btn-reset-all" class="btn btn-danger">Reset all</button>
        </div>
      </div>

    </div><!-- /.controls-panel -->
  </div><!-- /.controls-wrapper -->

  <!-- ── PAD GRID ── -->
  <div class="grid-wrapper">
    <div id="pad-grid" class="pad-grid"></div>
  </div>

  <!-- ── STATUS BAR ── -->
  <div class="status-bar">
    <span id="status-saved" style="opacity:0.6;"></span>
    <span id="status-words"></span>
    <span style="margin-left:auto;opacity:0.5;" title="Ctrl+Shift+F = focus mode, Esc = exit">Ctrl+Shift+F — focus mode</span>
  </div>

</div><!-- /.app-shell -->

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script type="module" src="app.js"></script>
</body>
</html>
